<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>furiJB Repo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-align: center; padding: 20px; background: #f0f0f5; }
        .container { background: white; border-radius: 12px; padding: 30px; max-width: 400px; margin: 50px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; color: #333; }
        p { color: #666; font-size: 16px; margin-bottom: 25px; line-height: 1.5; }
        a.btn { display: block; padding: 12px 20px; text-decoration: none; color: white; border-radius: 8px; font-weight: bold; margin-bottom: 15px; font-size: 16px; transition: opacity 0.2s;}
        a.btn:hover { opacity: 0.8; }
        .sileo { background: #007aff; }
        .zebra { background: #1c1c1e; }
        .cydia { background: #8B4513; }
        .repo-icon { width: 80px; height: 80px; border-radius: 20%; margin-bottom: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <img class="repo-icon" src="CydiaIcon.png" alt="Repo Icon">
        <h1>furiJB's Repo</h1>
        <p>Thêm repository này vào trình quản lý gói của bạn để tải các tweaks.</p>
        <a class="btn sileo" href="sileo://source/https://furiJB.github.io/repo/">Thêm vào Sileo</a>
        <a class="btn zebra" href="zbra://sources/add/https://furiJB.github.io/repo/">Thêm vào Zebra</a>
        <a class="btn cydia" href="cydia://url/https://cydia.saurik.com/api/share/#?source=https://furiJB.github.io/repo/">Thêm vào Cydia</a>
        
        <p style="margin-top:20px; font-size:12px; color:#999;">Github Pages Hosted Repo</p>
    </div>
</body>
</html>
